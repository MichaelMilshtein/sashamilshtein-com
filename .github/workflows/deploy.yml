name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Upload files to Hostinger via curl FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          DIST="artifacts/resume/dist/public"

          echo "=== VERBOSE TEST: uploading index.html to confirm FTP path ==="
          curl -v --max-time 30 \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            --ftp-create-dirs \
            -T "$DIST/index.html" \
            "ftp://$FTP_SERVER/index.html" 2>&1 || true

          echo ""
          echo "=== UPLOADING ALL FILES ==="
          find "$DIST" -type f | sort | while read filepath; do
            remote="${filepath#$DIST/}"
            echo ">>> $remote"
            curl -s --max-time 60 \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              -T "$filepath" \
              "ftp://$FTP_SERVER/$remote"
            echo "  OK"
          done

          echo ""
          echo "=== LISTING SERVER ROOT AFTER UPLOAD ==="
          curl -s --max-time 10 \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            "ftp://$FTP_SERVER/" 2>&1 || true

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "Site is UP!"
          else
            echo "Site returned $STATUS — check FTP logs above"
          fi
