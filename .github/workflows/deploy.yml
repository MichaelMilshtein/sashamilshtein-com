name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Deploy via SSH + rsync
        env:
          SSH_HOST: ${{ secrets.FTP_SERVER }}
          SSH_USER: ${{ secrets.FTP_USERNAME }}
          SSH_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass rsync

          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=15 -p 65002"

          echo "=== Locating web root for sashamilshtein.com ==="
          WEBROOT=$(sshpass -p "$SSH_PASS" ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
            "find /home -maxdepth 5 -type d -name 'public_html' 2>/dev/null | grep -i sashamilshtein | head -1")
          echo "Found: $WEBROOT"

          if [ -z "$WEBROOT" ]; then
            echo "Falling back to default path"
            WEBROOT="/home/$SSH_USER/domains/sashamilshtein.com/public_html"
          fi

          echo "=== Syncing files to $WEBROOT ==="
          sshpass -p "$SSH_PASS" rsync -avz --delete \
            -e "ssh $SSH_OPTS" \
            artifacts/resume/dist/public/ \
            "$SSH_USER@$SSH_HOST:$WEBROOT/"

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: Site is UP!"
          else
            echo "Unexpected status $STATUS"
          fi
