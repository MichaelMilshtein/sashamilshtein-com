name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Upload files to Hostinger via curl FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          DIST="artifacts/resume/dist/public"
          TARGET="ftp://$FTP_SERVER/domains/sashamilshtein.com/public_html/"

          echo "=== Uploading all files to $TARGET ==="
          find "$DIST" -type f | sort | while read filepath; do
            remote="${filepath#$DIST/}"
            echo ">>> $remote"
            curl -s --max-time 60 \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              -T "$filepath" \
              "${TARGET}${remote}"
            echo "  OK"
          done

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: Site is UP!"
          else
            BODY=$(curl -s https://sashamilshtein.com | head -c 500)
            echo "Response: $BODY"
          fi
