name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "machine $FTP_HOST login $FTP_USER password $FTP_PASS" > ~/.netrc
          chmod 600 ~/.netrc
          lftp -e "
            set ftp:passive-mode true;
            set ssl:verify-certificate false;
            open ftp://$FTP_HOST;
            mirror --reverse --delete --verbose artifacts/resume/dist/public/ public_html/;
            quit
          " 
