name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Confirm FTP path with test file
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "hello from deploy" > /tmp/test.html
          curl -s --max-time 15 \
            --user "$FTP_USERNAME:$FTP_PASSWORD" \
            -T /tmp/test.html \
            "ftp://$FTP_SERVER/test.html"
          sleep 3
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com/test.html)
          echo "test.html HTTP status: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "PATH CONFIRMED: FTP root = web root"
          else
            echo "WARNING: test.html not reachable at $STATUS — path may be wrong"
          fi

      - name: Upload all files to Hostinger via curl FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          DIST="artifacts/resume/dist/public"
          echo "=== UPLOADING ALL FILES ==="
          find "$DIST" -type f | sort | while read filepath; do
            remote="${filepath#$DIST/}"
            echo ">>> $remote"
            curl -s --max-time 60 \
              --user "$FTP_USERNAME:$FTP_PASSWORD" \
              --ftp-create-dirs \
              -T "$filepath" \
              "ftp://$FTP_SERVER/$remote"
            echo "  OK"
          done

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: Site is UP!"
          else
            BODY=$(curl -s https://sashamilshtein.com | head -c 300)
            echo "Response body: $BODY"
          fi
