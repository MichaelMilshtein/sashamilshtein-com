name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build resume
        run: pnpm --dir artifacts/resume run build:production

      - name: Deploy via lftp FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          DIST="artifacts/resume/dist/public"

          # Write lftp commands to a script file (avoids quoting issues)
          cat > /tmp/lftp_script.txt << 'LFTP_EOF'
          set ftp:ssl-allow no
          set ftp:passive-mode on
          set net:timeout 60
          set net:max-retries 3
          set net:reconnect-interval-base 3
          LFTP_EOF

          # Navigate up from FTP root (/public_html) to home, then into domain web root
          echo "cd .." >> /tmp/lftp_script.txt
          echo "cd domains/sashamilshtein.com/public_html" >> /tmp/lftp_script.txt
          echo "mkdir -p assets" >> /tmp/lftp_script.txt

          # Add a put command for every file in the build
          find "$DIST" -type f | sort | while read filepath; do
            remote="${filepath#$DIST/}"
            echo "put \"$filepath\" -o \"$remote\"" >> /tmp/lftp_script.txt
          done

          echo "bye" >> /tmp/lftp_script.txt

          echo "=== lftp script ==="
          cat /tmp/lftp_script.txt

          # Prepend connection command at top of script
          sed -i "1s|^|open -u $FTP_USERNAME,$FTP_PASSWORD ftp://$FTP_SERVER\n|" /tmp/lftp_script.txt

          echo "=== Running upload ==="
          lftp < /tmp/lftp_script.txt

      - name: Verify site is up
        run: |
          sleep 5
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sashamilshtein.com)
          echo "Site returned HTTP $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "SUCCESS: Site is UP!"
          else
            echo "Unexpected response: $STATUS" && exit 1
          fi
